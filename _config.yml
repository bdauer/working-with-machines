title: Working With Machines
description: Writing on working with AI agents — method, patterns, and where this is heading
remote_theme: just-the-docs/just-the-docs

url: https://workingwithmachines.dev
baseurl: ""

mermaid:
  version: "10.9.0"

plugins:
  - jekyll-relative-links
  - jekyll-redirect-from

relative_links:
  enabled: true

defaults:
  - scope:
      path: ""
    values:
      has_toc: false
  - scope:
      path: "articles"
    values:
      has_toc: true

exclude:
  - open-questions.md
  - "*.log"
  - "skills/*/SKILL.md"
  - "skills/*/references"
  - "skills/*/scripts"
  - "skills/*/assets"
  - "skills/shared"
